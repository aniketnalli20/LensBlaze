<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LensBlaze - Start</title>
    <link rel="stylesheet" href="./styles.css?v=20260401-3" />
  </head>
  <body class="links-page">
    <header class="topbar" role="banner">
      <div class="topbar__inner">
        <a class="brand" href="./index.html" aria-label="LensBlaze home">
          <span class="brand__mark" aria-hidden="true">
            <svg viewBox="0 0 64 64" width="34" height="34">
              <defs>
                <linearGradient id="g-redirect" x1="0" x2="1" y1="0" y2="1">
                  <stop offset="0" stop-color="#f2b24a" />
                  <stop offset="1" stop-color="#f08a2a" />
                </linearGradient>
              </defs>
              <path fill="url(#g-redirect)" d="M32 6 52 18v28L32 58 12 46V18z" opacity="0.25" />
              <path
                fill="url(#g-redirect)"
                d="M20 20h10l-6 10h-10zm14 0h10l-6 10h-10zm-7 14h10l-6 10H21zm14 0h10l-6 10H35z"
              />
            </svg>
          </span>
          <span class="brand__name brand__name--full">LensBlaze</span>
          <span class="brand__name brand__name--short" aria-hidden="true">LB</span>
        </a>
        <div class="topbar__actions">
          <a class="btn btn--secondary" href="./index.html">Back to home</a>
        </div>
      </div>
    </header>

    <main class="page" role="main">
      <section class="content">
        <section class="section section--contrast" aria-label="Quick actions">
          <header class="section__header">
            <h1 class="section__title">LensBlaze</h1>
            <p class="section__subtitle">
              Capture moments. Craft visuals that tell your story.
            </p>
          </header>

          <div class="cta">
            <img
              class="cta__bg"
              src="https://ik.imagekit.io/ikmedia/docs_images/examples/example_fashion_2.jpg"
              alt=""
              loading="lazy"
              decoding="async"
            />
            <div class="cta__inner">
              <h2 class="cta__title">Where would you like to go?</h2>
              <p class="cta__text">Book a shoot in a minute, or view selected work right away.</p>
              <div class="cta__actions">
                <a class="btn btn--primary" href="./book.html">Book a Shoot</a>
                <a class="btn btn--secondary" href="./index.html#bio">View Portfolio</a>
              </div>
            </div>
          </div>
        </section>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
