<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LensBlaze</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar" role="banner">
      <div class="topbar__inner">
        <a class="brand" href="#">
          <span class="brand__mark" aria-hidden="true">
            <svg viewBox="0 0 64 64" width="34" height="34">
              <defs>
                <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
                  <stop offset="0" stop-color="#f2b24a" />
                  <stop offset="1" stop-color="#f08a2a" />
                </linearGradient>
              </defs>
              <path
                fill="url(#g)"
                d="M32 6 52 18v28L32 58 12 46V18z"
                opacity="0.25"
              />
              <path
                fill="url(#g)"
                d="M20 20h10l-6 10h-10zm14 0h10l-6 10h-10zm-7 14h10l-6 10H21zm14 0h10l-6 10H35z"
              />
            </svg>
          </span>
          <span class="brand__name">LensBlaze</span>
        </a>

        <nav class="nav" aria-label="Primary">
          <div class="nav__item nav__dropdown">
            <button class="nav__trigger" type="button" aria-expanded="false">
              Product <span class="nav__chev" aria-hidden="true">▾</span>
            </button>
            <div class="nav__menu" role="menu" aria-label="Product">
              <a class="nav__link" href="#" role="menuitem">Overview</a>
              <a class="nav__link" href="#" role="menuitem">Features</a>
              <a class="nav__link" href="#" role="menuitem">Integrations</a>
            </div>
          </div>

          <div class="nav__item nav__dropdown">
            <button class="nav__trigger" type="button" aria-expanded="false">
              Solutions <span class="nav__chev" aria-hidden="true">▾</span>
            </button>
            <div class="nav__menu" role="menu" aria-label="Solutions">
              <a class="nav__link" href="#" role="menuitem">Teams</a>
              <a class="nav__link" href="#" role="menuitem">Coaches</a>
              <a class="nav__link" href="#" role="menuitem">Enterprise</a>
            </div>
          </div>

          <a class="nav__plain" href="#">Pricing</a>
        </nav>

        <div class="topbar__actions">
          <a class="topbar__login" href="#">Log In</a>
          <a class="btn btn--primary" href="#">Start free trial</a>
        </div>
      </div>
    </header>

    <main class="page" role="main">
      <section class="content"></section>

      <button class="chat" type="button" aria-label="Open chat">
        <span class="chat__bubble" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="18" height="18">
            <path
              fill="currentColor"
              d="M4 4h16a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H9l-5 4v-4H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"
            />
          </svg>
        </span>
      </button>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
